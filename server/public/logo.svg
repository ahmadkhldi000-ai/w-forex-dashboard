<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient: indigo → violet → pink (matches site theme) -->
    <linearGradient id="wGrad" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="wGrad2" x1="0" y1="0" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with gradient -->
  <rect width="240" height="240" rx="52" fill="url(#wGrad)"/>

  <!-- Subtle top highlight for depth (glassy) -->
  <rect width="240" height="120" rx="52" fill="url(#wGrad2)"/>

  <!-- The W mark: two upward-leaning peaks echoing a chart -->
  <g filter="url(#glow)">
    <path d="
      M 52 72
      L 78 72
      L 120 156
      L 162 72
      L 188 72
      L 140 184
      L 100 184
      Z
    " fill="#ffffff"/>
  </g>

  <!-- Accent: a rising tick / candle inside the left valley -->
  <rect x="112" y="120" width="5" height="40" rx="2.5" fill="#ffffff" opacity="0.85"/>
  <rect x="108" y="112" width="13" height="5" rx="2.5" fill="#ffffff" opacity="0.85"/>

  <!-- Thin inner stroke for crispness at small sizes -->
  <rect x="1.5" y="1.5" width="237" height="237" rx="50.5" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
</svg>
