<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ربط الهاتف · W Forex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Cairo', sans-serif; background: #0b0e14; color: #e8ecf4;
           min-height: 100vh; display: grid; place-items: center; padding: 20px; text-align: center; }
    .box { max-width: 420px; }
    .logo { width: 64px; height: 64px; border-radius: 16px; background: #f0b90b; color: #0b0e14;
            display: grid; place-items: center; font-weight: 900; font-size: 34px; margin: 0 auto 18px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #8a93a6; line-height: 1.7; margin-bottom: 26px; font-size: 15px; }
    #qrcode { background: #fff; padding: 16px; border-radius: 16px; display: inline-block; margin-bottom: 20px; }
    #qrcode canvas, #qrcode img { display: block; }
    .url { background: #141925; border: 1px solid #222a3a; border-radius: 10px; padding: 14px;
           font-family: monospace; font-size: 13px; word-break: break-all; margin-bottom: 18px; color: #f0b90b; }
    .btn { display: inline-block; background: #f0b90b; color: #0b0e14; padding: 14px 28px;
           border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 15px; }
    .note { color: #8a93a6; font-size: 12px; margin-top: 22px; line-height: 1.6; }
    .ip { color: #f0b90b; font-weight: 700; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">W</div>
  <h1>افتح W Forex على هاتفك</h1>
  <p>امسح الكود بكاميرا الهاتف، أو افتح الرابط مباشرة.<br>الهاتف يجب أن يكون على <b>نفس شبكة الواي فاي</b> لهذا الكمبيوتر.</p>

  <div id="qrcode"></div>

  <div class="url" id="urlBox">…</div>

  <a class="btn" id="openBtn" href="#">📱 افتح التطبيق الآن</a>

  <div class="note">
    ℹ️ يجب أن يكون الكمبيوتر وهاتفك على نفس الشبكة.<br>
    عنوان الخادم: <span class="ip" id="ipBox">…</span>
  </div>
</div>

<script src="qrcode.min.js"></script>
<script>
  // Use the LAN IP so the QR works on the phone (localhost would point at the phone itself).
  // 'localhost' is kept only when already browsing via the LAN IP (same-host access on the Mac).
  const host = /^192\.168\.|^10\.|^172\./.test(location.hostname) ? location.hostname : '192.168.2.102';
  const port = location.port || '3000';
  const url = 'http://' + host + ':' + port + '/m.html';

  document.getElementById('urlBox').textContent = url;
  document.getElementById('openBtn').href = url;
  document.getElementById('ipBox').textContent = host + ':' + port;

  new QRCode(document.getElementById('qrcode'), {
    text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
