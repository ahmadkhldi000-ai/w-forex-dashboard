services:
  - type: web
    name: w-forex-vip-dashboard
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: 'true'
      # Auth token for the MT5 EA
      - key: AUTH_TOKEN
        generateValue: true
      # Session secret
      - key: SESSION_SECRET
        generateValue: true
      # Telegram (optional — set in Render dashboard)
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT
        sync: false
      # Owner account (optional — set in Render dashboard)
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_NAME
        sync: false
      # SIM mode — keep ON for demo without EA
      - key: SIM_MODE
        value: 'on'
