# Render Blueprint — one-click deploy for W Forex Dashboard
# Click: https://render.com/deploy?repo=https://github.com/ahmadkhldi000-ai/w-forex-dashboard
previewsExpireAfterDays: 1
services:
  - type: web
    name: w-forex-dashboard
    runtime: node
    plan: free
    region: frankfurt   # closest to most users; change if needed
    rootDir: server     # the Node app lives in /server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: 'true'
      # Generate strong random secrets — DO NOT use these in production
      - key: AUTH_TOKEN
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
